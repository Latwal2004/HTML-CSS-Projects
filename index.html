<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Profile_Card UI</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://unpkg.com/boxicons@2.1.2/css/boxicons.min.css">
</head>
<body>
    

    <div class="profile-card">
        <div class="image">
            <img src="profile-card-img.jpg" alt="" class="profile-img">
        </div>

        <div class="text-data">
            <div class="name">Harish Latwal</div>
            <div class="job">Web Developer & CSE student</div>
        </div>

        <div class="media-button">
            <a href="#" class="link" style="background: #4267b2;">
                <i class="bx bxl-facebook"></i>
            </a>
            <a href="#" class="link" style="background: #1da1f2;">
                <i class="bx bxl-twitter"></i>
            </a>
            <a href="#" class="link">
                <i class="bx bxl-instagram" style="background: #e1306c;"></i>
            </a>
            <a href="#" class="link" style="background: #ff0000;">
                <i class="bx bxl-youtube"></i>
            </a>
        </div>



        <div class="buttons">
            <button class="button">Subscribe</button>
            <button class="button">Message</button>
        </div>

        <div class="analytics">
            <div class="data">
                  <i class="bx bx-heart"></i>
                  <span class="number">60k</span>
            </div>

            <div class="data">
                  <i class="bx bx-message-rounded"></i>
                  <span class="number">20k</span>
            </div>
            
            <div class="data">
                  <i class="bx bx-share"></i>
                  <span class="number">12k</span>
            </div>
        </div>
    </div>


</body>
</html>
